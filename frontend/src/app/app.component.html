@if (isLoginRoute) {
  <router-outlet></router-outlet>
} @else {
<div class="app-shell">
  <aside class="side-panel">
    <div class="brand">
      <div class="brand-mark">LF</div>
      <div>
        <p class="eyebrow">SaaS Console</p>
        <h1>Fleet Pulse</h1>
      </div>
    </div>

    <div class="tenant-card">
      <span class="tenant-logo">NW</span>
      <div>
        <strong>Northwind Logistics</strong>
        <small>Enterprise workspace</small>
      </div>
    </div>

    <button class="logout-cta" type="button" (click)="onLogout()">Logout</button>

    <nav class="menu">
      @for (item of navItems; track item.path) {
        <button
          type="button"
          class="menu-item"
          [routerLink]="item.path"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <span class="menu-icon">{{ item.icon }}</span>
          <span class="menu-item-main">
            <span>{{ item.label }}</span>
            <small>{{ item.hint }}</small>
          </span>
        </button>
      }
    </nav>

    <div class="panel-card">
      <div>
        <p class="eyebrow">Plan usage</p>
        <h3>184 / 250 assets</h3>
      </div>
      <div class="usage-bar"><span></span></div>
      <p>4 hubs, 9 dispatch teams, 31 active lanes.</p>
    </div>
  </aside>

  <main class="dashboard">
    <header class="topbar">
      <div>
        <p class="eyebrow">{{ pageCaption }}</p>
        <h2>{{ pageHeading }}</h2>
      </div>
      <div class="topbar-actions">
        <label class="search-box">
          <span>Search</span>
          <input type="search" placeholder="Trip, driver, invoice..." />
        </label>
        <button class="secondary-button" type="button" (click)="onExport()" [disabled]="!can('report:export')">Export</button>
        <button class="primary-button" type="button" (click)="onNewDispatch()" [disabled]="!can('dispatch:create')">New Dispatch</button>
        <button class="logout-topbar" type="button" (click)="onLogout()">Logout</button>
      </div>
    </header>

    <section class="view-host">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
}
