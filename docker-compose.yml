services:
  nginx:
    image: nginx:1.27-alpine
    container_name: logistics-nginx
    depends_on:
      - backend
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - logistics

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: logistics-backend
    working_dir: /app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: development
      DB_DRIVER: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-logistics}
      DB_USERNAME: ${MYSQL_USER:-logistics}
      DB_PASSWORD: ${MYSQL_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - mysql
      - redis
    networks:
      - logistics

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: logistics-frontend
    working_dir: /app
    command: npm start -- --host 0.0.0.0 --port 4200
    ports:
      - "${FRONTEND_PORT:-4200}:4200"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    networks:
      - logistics

  mysql:
    image: mysql:8.4
    container_name: logistics-mysql
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-logistics}
      MYSQL_USER: ${MYSQL_USER:-logistics}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootsecret}
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - logistics

  postgres:
    image: postgres:16-alpine
    container_name: logistics-postgres
    profiles:
      - postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-logistics}
      POSTGRES_USER: ${POSTGRES_USER:-logistics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - logistics

  redis:
    image: redis:7.4-alpine
    container_name: logistics-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - logistics

volumes:
  frontend_node_modules:
  mysql_data:
  postgres_data:
  redis_data:

networks:
  logistics:
    driver: bridge
